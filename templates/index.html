<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTrees — Análise Filogenética</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --bg2:       #13161e;
  --bg3:       #1a1e2a;
  --bg4:       #222736;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --text:      #e8eaf0;
  --text2:     #9099b0;
  --text3:     #5a6380;
  --accent:    #4ade80;
  --accent2:   #22d3ee;
  --accent3:   #a78bfa;
  --warn:      #fbbf24;
  --danger:    #f87171;
  --panel-w:   340px;
  --header-h:  52px;
  --radius:    8px;
  --radius-lg: 14px;
  font-family: 'Inter', system-ui, sans-serif;
  color-scheme: dark;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

/* ─── Header ─────────────────────────────────────────────────────────── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  z-index: 100; backdrop-filter: blur(8px);
}
.logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: -0.5px; }
.logo-sub { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 1px; }
.hdr-sep { width: 1px; height: 28px; background: var(--border); margin: 0 8px; }
.hdr-tabs { display: flex; gap: 2px; }
.hdr-tab {
  padding: 5px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--text2); transition: all .15s; border: none;
  background: none; display: flex; align-items: center; gap: 6px;
}
.hdr-tab:hover { background: var(--bg3); color: var(--text); }
.hdr-tab.active { background: var(--bg4); color: var(--accent); }
.hdr-tab svg { width: 15px; height: 15px; }
.hdr-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn-icon {
  width: 32px; height: 32px; border-radius: 6px; background: none;
  border: 1px solid var(--border2); cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: var(--text2);
  transition: all .15s;
}
.btn-icon:hover { background: var(--bg3); color: var(--text); }

/* ─── Layout ──────────────────────────────────────────────────────────── */
#app {
  position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
  display: flex;
}
#sidebar {
  width: var(--panel-w); background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  flex-shrink: 0;
}
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
#right-panel {
  width: 300px; background: var(--bg2); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  transition: width .2s;
}
#right-panel.collapsed { width: 0; overflow: hidden; }

/* ─── Sidebar ─────────────────────────────────────────────────────────── */
.panel-header {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
</style>
</head>
<body>
  <div id="header">
    <div class="logo">MyTrees</div>
    <div class="logo-sub">Análise Filogenética</div>
    <div class="hdr-sep"></div>
    <div class="hdr-tabs">
      <button class="hdr-tab active">Workspace</button>
      <button class="hdr-tab">Análises</button>
    </div>
    <div class="hdr-right">
      <button class="btn-icon">⚙️</button>
    </div>
  </div>
  <div id="app">
    <div id="sidebar">
      <div class="panel-header">
        <span>Painel Lateral</span>
      </div>
    </div>
    <div id="main">
      <div class="panel-header">
        <span>Área Principal</span>
      </div>
    </div>
    <div id="right-panel">
      <div class="panel-header">
        <span>Painel Direito</span>
      </div>
    </div>
  </div>
</body>
</html>
